name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest

      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist

  paper:
    name: Build paper PDF
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile English arXiv paper
        uses: xu-cheng/latex-action@v4
        with:
          root_file: docs/arxiv/state_is_all_you_need_en.tex
          working_directory: .
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: state-is-all-you-need-pdf
          path: docs/arxiv/state_is_all_you_need_en.pdf
