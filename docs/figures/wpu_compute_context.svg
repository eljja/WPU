<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">WPU compute context</title>
  <desc id="desc">Conceptual comparison of CPU, GPU, TPU, NPU, LPU, and proposed WPU compute targets.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .title { font-family: "Trebuchet MS", "Aptos Display", sans-serif; font-size: 58px; font-weight: 800; fill: #5f93d6; letter-spacing: 1px; }
      .subtitle { font-family: "Trebuchet MS", "Aptos", sans-serif; font-size: 30px; font-weight: 800; fill: #36343c; }
      .note { font-family: "Aptos", "Segoe UI", sans-serif; font-size: 17px; fill: #55515a; }
      .panel { fill: #f7fbff; stroke: #4f7fb8; stroke-width: 2; }
      .panel-green { fill: #f4fbf5; stroke: #4b9b63; stroke-width: 2; }
      .panel-gold { fill: #fff8e9; stroke: #c98a22; stroke-width: 2; }
      .panel-purple { fill: #fbf6ff; stroke: #8f65c9; stroke-width: 2; }
      .panel-teal { fill: #effafa; stroke: #3d8a91; stroke-width: 2; }
      .label { font-family: "Trebuchet MS", "Aptos", sans-serif; font-size: 30px; font-weight: 800; fill: #17171a; }
      .heading { font-family: "Trebuchet MS", "Aptos", sans-serif; font-size: 24px; font-weight: 800; fill: #17171a; }
      .small { font-family: "Aptos", "Segoe UI", sans-serif; font-size: 15px; fill: #24242a; }
      .tiny { font-family: "Aptos", "Segoe UI", sans-serif; font-size: 13px; fill: #24242a; }
      .box { fill: #ffffff; stroke: #637083; stroke-width: 1.4; }
      .box-blue { fill: #dff0ff; stroke: #5b97ce; stroke-width: 1.4; }
      .box-green { fill: #def4e2; stroke: #5da56a; stroke-width: 1.4; }
      .box-gold { fill: #fff0c2; stroke: #c98a22; stroke-width: 1.4; }
      .box-purple { fill: #efe4fb; stroke: #8f65c9; stroke-width: 1.4; }
      .box-red { fill: #ffe5dc; stroke: #d87b66; stroke-width: 1.4; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #9aa6b2; stroke-width: 1.8; fill: none; }
      .chip { fill: #ffffff; stroke: #28633c; stroke-width: 3; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#123c7a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect class="bg" width="1400" height="980"/>
  <text class="title" x="700" y="70" text-anchor="middle">6 AI Compute Architectures</text>
  <text class="subtitle" x="700" y="112" text-anchor="middle">CPU vs GPU vs TPU vs NPU vs LPU vs WPU</text>
  <text class="note" x="700" y="145" text-anchor="middle">Conceptual workload comparison. WPU is proposed for explicit world-state processing.</text>

  <!-- Top row panels -->
  <g transform="translate(30 175)">
    <rect class="panel-green" x="0" y="0" width="210" height="310" rx="18" filter="url(#shadow)"/>
    <rect class="chip" x="35" y="28" width="45" height="45" rx="8"/>
    <path d="M30 38 H18 M30 50 H18 M30 62 H18 M85 38 H97 M85 50 H97 M85 62 H97 M45 23 V11 M57 23 V11 M69 23 V11 M45 78 V90 M57 78 V90 M69 78 V90" stroke="#28633c" stroke-width="3"/>
    <text class="label" x="116" y="63">CPU</text>
    <rect class="box-green" x="20" y="105" width="170" height="92" rx="10"/>
    <text class="heading" x="105" y="134" text-anchor="middle">Control</text>
    <text class="small" x="105" y="159" text-anchor="middle">scalar logic</text>
    <text class="small" x="105" y="181" text-anchor="middle">branching</text>
    <rect class="box-purple" x="20" y="215" width="170" height="38" rx="8"/>
    <text class="small" x="105" y="239" text-anchor="middle">L1 / L2 / L3 cache</text>
    <path class="arrow" d="M105 253 V269"/>
    <rect class="box-red" x="20" y="270" width="170" height="32" rx="8"/>
    <text class="small" x="105" y="292" text-anchor="middle">DRAM</text>
  </g>

  <g transform="translate(260 175)">
    <rect class="panel" x="0" y="0" width="210" height="310" rx="18" filter="url(#shadow)"/>
    <rect class="box-blue" x="34" y="28" width="48" height="45" rx="4"/>
    <text class="label" x="115" y="63">GPU</text>
    <rect class="box" x="20" y="105" width="170" height="180" rx="10"/>
    <text class="heading" x="105" y="132" text-anchor="middle">SIMT</text>
    <text class="small" x="105" y="154" text-anchor="middle">parallel tensor</text>
    <text class="small" x="105" y="176" text-anchor="middle">throughput</text>
    <g fill="#8ecae6" stroke="#2e5f9f">
      <rect x="48" y="202" width="28" height="28" rx="4"/><rect x="91" y="202" width="28" height="28" rx="4"/><rect x="134" y="202" width="28" height="28" rx="4"/>
      <rect x="48" y="242" width="28" height="28" rx="4"/><rect x="91" y="242" width="28" height="28" rx="4"/><rect x="134" y="242" width="28" height="28" rx="4"/>
    </g>
  </g>

  <g transform="translate(490 175)">
    <rect class="panel-purple" x="0" y="0" width="210" height="310" rx="18" filter="url(#shadow)"/>
    <rect class="box-purple" x="34" y="28" width="48" height="45" rx="4"/>
    <text class="label" x="115" y="63">TPU</text>
    <rect class="box-gold" x="20" y="105" width="170" height="112" rx="10"/>
    <text class="heading" x="105" y="132" text-anchor="middle">Systolic</text>
    <text class="heading" x="105" y="158" text-anchor="middle">matrix array</text>
    <g fill="#dff0ff" stroke="#5b97ce">
      <circle cx="62" cy="184" r="11"/><circle cx="105" cy="184" r="11"/><circle cx="148" cy="184" r="11"/>
      <circle cx="62" cy="207" r="11"/><circle cx="105" cy="207" r="11"/><circle cx="148" cy="207" r="11"/>
    </g>
    <rect class="box-purple" x="25" y="238" width="160" height="34" rx="8"/>
    <text class="small" x="105" y="260" text-anchor="middle">on-chip SRAM</text>
  </g>

  <g transform="translate(720 175)">
    <rect class="panel-teal" x="0" y="0" width="210" height="310" rx="18" filter="url(#shadow)"/>
    <rect class="box-blue" x="34" y="28" width="48" height="45" rx="4"/>
    <text class="label" x="115" y="63">NPU</text>
    <rect class="box-blue" x="20" y="105" width="170" height="70" rx="10"/>
    <text class="heading" x="105" y="134" text-anchor="middle">Neural</text>
    <text class="small" x="105" y="159" text-anchor="middle">inference engine</text>
    <rect class="box-gold" x="25" y="195" width="160" height="34" rx="8"/>
    <text class="small" x="105" y="217" text-anchor="middle">tensor buffer</text>
    <rect class="box-purple" x="25" y="248" width="160" height="34" rx="8"/>
    <text class="small" x="105" y="270" text-anchor="middle">on-chip SRAM</text>
  </g>

  <g transform="translate(950 175)">
    <rect class="panel" x="0" y="0" width="210" height="310" rx="18" filter="url(#shadow)"/>
    <rect class="box-blue" x="34" y="28" width="48" height="45" rx="4"/>
    <text class="label" x="115" y="63">LPU</text>
    <rect class="box-blue" x="20" y="105" width="170" height="84" rx="10"/>
    <text class="heading" x="105" y="134" text-anchor="middle">Token</text>
    <text class="small" x="105" y="159" text-anchor="middle">streaming</text>
    <text class="small" x="105" y="181" text-anchor="middle">inference</text>
    <rect class="box-purple" x="25" y="215" width="160" height="34" rx="8"/>
    <text class="small" x="105" y="237" text-anchor="middle">on-chip SRAM</text>
    <rect class="box-red" x="25" y="263" width="160" height="34" rx="8"/>
    <text class="small" x="105" y="285" text-anchor="middle">off-chip memory</text>
  </g>

  <g transform="translate(1180 175)">
    <rect class="panel-gold" x="0" y="0" width="190" height="310" rx="18" filter="url(#shadow)"/>
    <rect class="box-gold" x="30" y="28" width="48" height="45" rx="4"/>
    <text class="label" x="112" y="63">WPU</text>
    <text class="tiny" x="95" y="92" text-anchor="middle">proposed</text>
    <rect class="box-green" x="18" y="112" width="154" height="50" rx="8"/>
    <text class="small" x="95" y="134" text-anchor="middle">state store</text>
    <text class="tiny" x="95" y="153" text-anchor="middle">objects + relations</text>
    <rect class="box-blue" x="18" y="176" width="154" height="50" rx="8"/>
    <text class="small" x="95" y="198" text-anchor="middle">frontier router</text>
    <text class="tiny" x="95" y="217" text-anchor="middle">sparse / hybrid / dense</text>
    <rect class="box-purple" x="18" y="240" width="154" height="50" rx="8"/>
    <text class="small" x="95" y="262" text-anchor="middle">branch deltas</text>
    <text class="tiny" x="95" y="281" text-anchor="middle">future overlays</text>
  </g>

  <!-- WPU focus block -->
  <rect class="panel-gold" x="85" y="555" width="1230" height="350" rx="22" filter="url(#shadow)"/>
  <text class="label" x="700" y="602" text-anchor="middle">WPU (Proposed): World-State Processing</text>
  <text class="note" x="700" y="632" text-anchor="middle">A workload-oriented architecture for persistent objects, relations, deltas, uncertainty, and branches.</text>

  <g transform="translate(130 670)">
    <rect class="box-green" x="0" y="0" width="230" height="150" rx="12"/>
    <text class="heading" x="115" y="35" text-anchor="middle">State Memory</text>
    <text class="small" x="38" y="72">object identity</text>
    <text class="small" x="38" y="98">typed relations</text>
    <text class="small" x="38" y="124">belief and time</text>
  </g>
  <path class="arrow" d="M360 745 H455"/>
  <g transform="translate(455 670)">
    <rect class="box-blue" x="0" y="0" width="230" height="150" rx="12"/>
    <text class="heading" x="115" y="35" text-anchor="middle">Update Engine</text>
    <text class="small" x="38" y="72">event frontier</text>
    <text class="small" x="38" y="98">local propagation</text>
    <text class="small" x="38" y="124">dense fallback</text>
  </g>
  <path class="arrow" d="M685 745 H780"/>
  <g transform="translate(780 670)">
    <rect class="box-purple" x="0" y="0" width="230" height="150" rx="12"/>
    <text class="heading" x="115" y="35" text-anchor="middle">Branch Manager</text>
    <text class="small" x="38" y="72">BaseState + DeltaState</text>
    <text class="small" x="38" y="98">probability update</text>
    <text class="small" x="38" y="124">rollout sampling</text>
  </g>
  <path class="arrow" d="M1010 745 H1105"/>
  <g transform="translate(1105 670)">
    <rect class="box-gold" x="0" y="0" width="170" height="150" rx="12"/>
    <text class="heading" x="85" y="35" text-anchor="middle">Memory</text>
    <text class="small" x="25" y="72">hot state</text>
    <text class="small" x="25" y="98">active state</text>
    <text class="small" x="25" y="124">long-term state</text>
  </g>

  <rect class="box" x="170" y="845" width="1060" height="36" rx="10"/>
  <text class="small" x="700" y="868" text-anchor="middle">Core contrast: dense accelerators optimize tensor kernels; WPU targets structured state maintenance and event-driven propagation.</text>
</svg>
